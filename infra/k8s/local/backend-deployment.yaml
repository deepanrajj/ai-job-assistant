apiVersion: apps/v1
kind: Deployment
metadata:
  name: smart-job-tracker-backend
  labels:
    app.kubernetes.io/name: smart-job-tracker-backend
    app.kubernetes.io/part-of: smart-job-tracker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: smart-job-tracker-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: smart-job-tracker-backend
        app.kubernetes.io/part-of: smart-job-tracker
    spec:
      containers:
        - name: backend
          image: smart-job-tracker-backend:local
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 4000
          envFrom:
            - configMapRef:
                name: smart-job-tracker-backend-config
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: smart-job-tracker-secrets
                  key: OPENAI_API_KEY
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smart-job-tracker-secrets
                  key: POSTGRES_PASSWORD
          readinessProbe:
            httpGet:
              path: /api/ai/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/ai/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
