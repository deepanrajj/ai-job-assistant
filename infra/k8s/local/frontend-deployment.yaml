apiVersion: apps/v1
kind: Deployment
metadata:
  name: smart-job-tracker-frontend
  labels:
    app.kubernetes.io/name: smart-job-tracker-frontend
    app.kubernetes.io/part-of: smart-job-tracker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: smart-job-tracker-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: smart-job-tracker-frontend
        app.kubernetes.io/part-of: smart-job-tracker
    spec:
      containers:
        - name: frontend
          image: smart-job-tracker-frontend:local
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
