apiVersion: apps/v1
kind: Deployment
metadata:
  name: smart-job-tracker-postgres
  labels:
    app.kubernetes.io/name: smart-job-tracker-postgres
    app.kubernetes.io/part-of: smart-job-tracker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: smart-job-tracker-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: smart-job-tracker-postgres
        app.kubernetes.io/part-of: smart-job-tracker
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - name: postgres
              containerPort: 5432
          envFrom:
            - configMapRef:
                name: smart-job-tracker-postgres-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smart-job-tracker-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          emptyDir: {}
